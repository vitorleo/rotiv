name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rotiv
            artifact: rotiv-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: rotiv
            artifact: rotiv-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rotiv.exe
            artifact: rotiv-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and build TypeScript packages
        # Required before `cargo build` so that include_str!() can embed the
        # compiled route-worker and migrate-script source files.
        run: pnpm install && pnpm -r run build

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p rotiv-cli
        env:
          RUSTC_WRAPPER: ""

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/rotiv-linux-x86_64/rotiv-linux-x86_64
            artifacts/rotiv-macos-arm64/rotiv-macos-arm64
            artifacts/rotiv-windows-x64.exe/rotiv-windows-x64.exe
