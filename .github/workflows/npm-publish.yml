name: Publish npm packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Publish @rotiv/types
        run: pnpm publish --no-git-checks
        working-directory: packages/@rotiv/types
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @rotiv/jsx-runtime
        run: pnpm publish --no-git-checks
        working-directory: packages/@rotiv/jsx-runtime
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @rotiv/sdk
        run: pnpm publish --no-git-checks
        working-directory: packages/@rotiv/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @rotiv/signals
        run: pnpm publish --no-git-checks
        working-directory: packages/@rotiv/signals
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @rotiv/orm
        run: pnpm publish --no-git-checks
        working-directory: packages/@rotiv/orm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
